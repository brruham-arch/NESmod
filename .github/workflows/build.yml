name: Build NESMod APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone SimpleNES
        run: git clone https://github.com/amhndu/SimpleNES.git /tmp/SimpleNES

      - name: Copy SimpleNES sources
        run: |
          DST=app/src/main/cpp/nes
          mkdir -p $DST/src/APU $DST/include/APU

          for f in CPU MainBus PPU PictureBus Cartridge Mapper MapperNROM \
                   MapperSxROM MapperUxROM MapperCNROM MapperAxROM MapperGxROM \
                   MapperMMC3 MapperColorDreams Log; do
            cp /tmp/SimpleNES/src/${f}.cpp $DST/src/
          done
          for f in APU DMC FrameCounter Noise Pulse Triangle Units; do
            cp /tmp/SimpleNES/src/APU/${f}.cpp $DST/src/APU/
          done

          for f in Cartridge CPU CPUOpcodes IRQ Log MainBus Mapper \
                   MapperAxROM MapperCNROM MapperColorDreams MapperGxROM \
                   MapperMMC3 MapperNROM MapperSxROM MapperUxROM \
                   PaletteColors PictureBus PPU; do
            cp /tmp/SimpleNES/include/${f}.h $DST/include/
          done
          for f in APU Constants Divider DMC FrameCounter Noise Pulse \
                   PulseUnits Timer Triangle Units; do
            cp /tmp/SimpleNES/include/APU/${f}.h $DST/include/APU/ 2>/dev/null || true
          done
          cp /tmp/SimpleNES/include/APU/spsc.hpp $DST/include/APU/ 2>/dev/null || true

          # Jangan copy Controller.h — kita punya versi sendiri di repo
          echo "=== Copy done ==="
          ls $DST/include/

      - name: Patch SFML dependencies
        run: |
          DST=app/src/main/cpp/nes

          # 1. PaletteColors.h — ganti SFML/Config.hpp + tambah sf::Color stub
          cat > $DST/include/PaletteColors.h << 'EOF'
          #pragma once
          #include <cstdint>
          namespace sf {
          struct Color {
              uint8_t r, g, b, a;
              Color(uint8_t r=0,uint8_t g=0,uint8_t b=0,uint8_t a=255):r(r),g(g),b(b),a(a){}
              static const Color White;
              static const Color Black;
              static const Color Magenta;
              static const Color Transparent;
          };
          }
          namespace sn {
          static const sf::Color colors[] = {
            sf::Color(117,117,117),sf::Color(39,27,143),sf::Color(0,0,171),sf::Color(71,0,159),
            sf::Color(143,0,119),sf::Color(171,0,19),sf::Color(167,0,0),sf::Color(127,11,0),
            sf::Color(67,47,0),sf::Color(0,71,0),sf::Color(0,81,0),sf::Color(0,63,23),
            sf::Color(27,63,95),sf::Color(0,0,0),sf::Color(0,0,0),sf::Color(0,0,0),
            sf::Color(188,188,188),sf::Color(0,115,239),sf::Color(35,59,239),sf::Color(131,0,243),
            sf::Color(191,0,191),sf::Color(231,0,91),sf::Color(219,43,0),sf::Color(203,79,15),
            sf::Color(139,115,0),sf::Color(0,151,0),sf::Color(0,171,0),sf::Color(0,147,59),
            sf::Color(0,131,139),sf::Color(0,0,0),sf::Color(0,0,0),sf::Color(0,0,0),
            sf::Color(255,255,255),sf::Color(63,191,255),sf::Color(95,151,255),sf::Color(167,139,253),
            sf::Color(247,123,255),sf::Color(255,119,183),sf::Color(255,119,99),sf::Color(255,155,59),
            sf::Color(243,191,63),sf::Color(131,211,19),sf::Color(79,223,75),sf::Color(88,248,152),
            sf::Color(0,235,219),sf::Color(0,0,0),sf::Color(0,0,0),sf::Color(0,0,0),
            sf::Color(255,255,255),sf::Color(171,231,255),sf::Color(199,215,255),sf::Color(215,203,255),
            sf::Color(255,199,255),sf::Color(255,199,219),sf::Color(255,191,179),sf::Color(255,219,171),
            sf::Color(255,231,163),sf::Color(227,255,163),sf::Color(171,243,191),sf::Color(179,255,207),
            sf::Color(159,255,243),sf::Color(0,0,0),sf::Color(0,0,0),sf::Color(0,0,0)
          };
          }
          EOF

          # 2. PPU.h — hapus SFML/Graphics.hpp
          sed -i 's|#include <SFML/Graphics.hpp>||g' $DST/include/PPU.h

          # 3. PPU.cpp — fix sf::Color::Magenta
          sed -i 's|sf::Color::Magenta|sf::Color(255,0,255)|g' $DST/src/PPU.cpp

          # 4. AudioPlayer.h — gunakan spsc::RingBuffer real
          cat > $DST/include/AudioPlayer.h << 'EOF'
          #pragma once
          #include <cstdint>
          #include "APU/spsc.hpp"
          class AudioPlayer {
          public:
              spsc::RingBuffer<float> audio_queue{4096};
              int output_sample_rate;
              AudioPlayer(int rate = 44100) : output_sample_rate(rate) {}
              void start() {}
              void stop()  {}
          };
          EOF

          # 5. Controller.h — versi kita sudah ada di repo, tapi pastikan ada method strobe()
          cat > $DST/include/Controller.h << 'EOF'
          #pragma once
          #include <cstdint>
          namespace sn {
          using Byte = uint8_t;
          class Controller {
          public:
              void setKeyState(uint8_t mask) { m_state = mask; }
              void strobe(Byte b) { if (b & 1) m_shift = 0; }
              Byte read() {
                  if (m_shift >= 8) return 1;
                  return (m_state >> m_shift++) & 1;
              }
          private:
              uint8_t m_state = 0;
              int     m_shift = 0;
          };
          }
          EOF

          # 6. VirtualScreen.cpp — define static Color members
          cat > $DST/src/VirtualScreen.cpp << 'EOF'
          #include "VirtualScreen.h"
          namespace sf {
          const Color Color::White{255,255,255,255};
          const Color Color::Black{0,0,0,255};
          const Color Color::Magenta{255,0,255,255};
          const Color Color::Transparent{0,0,0,0};
          }
          EOF

          # 7. Patch APU src files — hapus SFML/Audio/SoundStream.hpp
          for f in $DST/src/APU/APU.cpp $DST/src/APU/DMC.cpp $DST/src/APU/Noise.cpp 
                   $DST/src/APU/Pulse.cpp $DST/src/APU/Triangle.cpp $DST/src/APU/FrameCounter.cpp $DST/src/APU/Units.cpp; do
            sed -i "s|#include <SFML/Audio/SoundStream.hpp>||g" "$f" 2>/dev/null || true
            sed -i "s|#include <SFML/Audio.hpp>||g" "$f" 2>/dev/null || true
          done

          # patch APU src
          for f in APU DMC Noise Pulse Triangle FrameCounter Units; do
            sed -i 's|#include <SFML/Audio/SoundStream.hpp>||g' $DST/src/APU/${f}.cpp 2>/dev/null || true
            sed -i 's|#include <SFML/Audio.hpp>||g' $DST/src/APU/${f}.cpp 2>/dev/null || true
          done

          echo "=== Patch done ==="

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install NDK r25c
        run: sdkmanager "ndk;25.2.9519653" --sdk_root=$ANDROID_SDK_ROOT

      - name: Generate Gradle wrapper
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.1.1-bin.zip -o /tmp/g.zip
          unzip -q /tmp/g.zip -d /tmp/gd
          /tmp/gd/gradle-8.1.1/bin/gradle wrapper --gradle-version 8.1.1
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: NESMod-debug
          path: app/build/outputs/apk/debug/app-debug.apk
