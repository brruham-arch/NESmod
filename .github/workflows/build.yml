name: Build NESMod APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone SimpleNES
        run: git clone https://github.com/amhndu/SimpleNES.git /tmp/SimpleNES

      - name: Copy SimpleNES sources
        run: |
          DST=app/src/main/cpp/nes
          mkdir -p $DST/src/APU $DST/include/APU
          for f in CPU MainBus PPU PictureBus Cartridge Controller Mapper MapperNROM MapperSxROM MapperUxROM MapperCNROM MapperAxROM MapperGxROM MapperMMC3 MapperColorDreams Log; do
            cp /tmp/SimpleNES/src/${f}.cpp $DST/src/
          done
          for f in APU DMC FrameCounter Noise Pulse Triangle Units; do
            cp /tmp/SimpleNES/src/APU/${f}.cpp $DST/src/APU/
          done
          for f in Cartridge CPU CPUOpcodes IRQ Log MainBus Mapper MapperAxROM MapperCNROM MapperColorDreams MapperGxROM MapperMMC3 MapperNROM MapperSxROM MapperUxROM PictureBus PPU; do
            cp /tmp/SimpleNES/include/${f}.h $DST/include/
          done
          for f in APU Constants Divider DMC FrameCounter Noise Pulse PulseUnits Timer Triangle Units; do
            cp /tmp/SimpleNES/include/APU/${f}.h $DST/include/APU/ 2>/dev/null || true
          done
          cp /tmp/SimpleNES/include/APU/spsc.hpp $DST/include/APU/ 2>/dev/null || true

      - name: Patch SFML dependencies
        run: |
          DST=app/src/main/cpp/nes

          # ── VirtualScreen.h (ours, already in repo) ──────────────────────

          # ── PaletteColors.h — remove SFML/Config.hpp, define sf::Uint8 ──
          sed -i 's|#include <SFML/Config.hpp>|#include <cstdint>\nnamespace sf { using Uint8 = uint8_t; }|' \
            $DST/include/PaletteColors.h

          # ── PPU.h — remove SFML/Graphics.hpp ────────────────────────────
          sed -i 's|#include <SFML/Graphics.hpp>||' $DST/include/PPU.h

          # ── PPU.cpp — fix sf::Color::Magenta → our Color ────────────────
          sed -i 's|sf::Color::Magenta|sf::Color(255,0,255)|g' $DST/src/PPU.cpp
          # fix sf::Color(r,g,b) calls in PPU.cpp setPixel
          # PPU.cpp uses m_screen.setPixel(x, y, sf::Color(r,g,b)) — ok, our VirtualScreen accepts it

          # ── Controller.h — replace SFML with bitmask impl ───────────────
          cat > $DST/include/Controller.h << 'EOF'
          #pragma once
          #include <cstdint>
          namespace sn {
          using Byte = uint8_t;
          class Controller {
          public:
              void setKeyState(uint8_t mask) { m_state = mask; }
              void strobe(Byte b) { if (b & 1) m_shift = 0; }
              Byte read() {
                  if (m_shift >= 8) return 1;
                  return (m_state >> m_shift++) & 1;
              }
          private:
              uint8_t m_state = 0;
              int     m_shift = 0;
          };
          }
          EOF

          # ── AudioPlayer.h — real spsc::RingBuffer compatible ─────────────
          # APU.h needs: player.audio_queue (spsc::RingBuffer<float>&)
          #              player.output_sample_rate (int)
          # Solution: patch APU.h to not store reference, use pointer instead
          # Easier: patch AudioPlayer.h to include spsc.hpp and use real type
          cat > $DST/include/AudioPlayer.h << 'EOF'
          #pragma once
          #include <cstdint>
          #include "APU/spsc.hpp"
          class AudioPlayer {
          public:
              spsc::RingBuffer<float> audio_queue{4096};
              int output_sample_rate;
              AudioPlayer(int rate = 44100) : output_sample_rate(rate) {}
              void start() {}
              void stop()  {}
          };
          EOF

          # ── PaletteColors.h — also needs sf::Color for array ────────────
          # Add full sf::Color struct before palette array
          python3 - << 'PYEOF'
          import re
          path = 'app/src/main/cpp/nes/include/PaletteColors.h'
          with open(path) as f: content = f.read()
          # Remove any existing sf:: namespace stub
          content = re.sub(r'namespace sf \{[^}]+\}', '', content)
          # Add Color struct after includes
          stub = '''
          namespace sf {
          using Uint8 = uint8_t;
          struct Color {
              Uint8 r, g, b, a;
              Color(Uint8 r=0,Uint8 g=0,Uint8 b=0,Uint8 a=255):r(r),g(g),b(b),a(a){}
              static const Color White;
              static const Color Black;
              static const Color Magenta;
          };
          }
          '''
          # Insert after last #include
          content = re.sub(r'(#include[^\n]*\n)(?!#include)', r'\1' + stub + '\n', content, count=1)
          with open(path, 'w') as f: f.write(content)
          PYEOF

          # ── VirtualScreen.cpp — define static Color members ──────────────
          cat > $DST/src/VirtualScreen.cpp << 'EOF'
          #include "VirtualScreen.h"
          namespace sf {
          const Color Color::White{255,255,255,255};
          const Color Color::Black{0,0,0,255};
          const Color Color::Magenta{255,0,255,255};
          }
          EOF

          echo "=== Patch done ==="

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install NDK r25c
        run: sdkmanager "ndk;25.2.9519653" --sdk_root=$ANDROID_SDK_ROOT

      - name: Generate Gradle wrapper
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.1.1-bin.zip -o /tmp/g.zip
          unzip -q /tmp/g.zip -d /tmp/gd
          /tmp/gd/gradle-8.1.1/bin/gradle wrapper --gradle-version 8.1.1
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: NESMod-debug
          path: app/build/outputs/apk/debug/app-debug.apk
